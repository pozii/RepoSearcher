name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 go build -o build/repo-searcher-windows-amd64.exe .

      - name: Build Windows ARM64
        run: GOOS=windows GOARCH=arm64 go build -o build/repo-searcher-windows-arm64.exe .

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o build/repo-searcher-darwin-amd64 .

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o build/repo-searcher-darwin-arm64 .

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o build/repo-searcher-linux-amd64 .

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o build/repo-searcher-linux-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/repo-searcher-windows-amd64.exe
            build/repo-searcher-windows-arm64.exe
            build/repo-searcher-darwin-amd64
            build/repo-searcher-darwin-arm64
            build/repo-searcher-linux-amd64
            build/repo-searcher-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
